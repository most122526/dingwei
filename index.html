<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>宠物定位追踪器 | NB-IoT智能项圈</title>
    <!-- 高德地图 JS API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=6d2f2e12162bdea11ad316ecd445ebe4"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #e0f0e8 0%, #c2dfd4 100%);
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        /* 手机卡片容器 */
        .phone-app {
            max-width: 480px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255,255,255,0.6);
            overflow: hidden;
            padding: 20px 18px 30px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            background: linear-gradient(135deg, #1f6e5c, #2a9d8f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.3px;
        }

        .sub {
            text-align: center;
            color: #6b8f82;
            font-size: 0.75rem;
            margin-top: 4px;
            margin-bottom: 20px;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.05);
            border-radius: 60px;
            padding: 8px 16px;
            margin-bottom: 20px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .device-status {
            background: #e0e7ff;
            padding: 4px 14px;
            border-radius: 40px;
            color: #1e3a8a;
        }
        .device-status.online {
            background: #d1fae5;
            color: #065f46;
        }
        .battery, .signal {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* 连接步骤指示器 */
        .step-indicator {
            display: flex;
            gap: 12px;
            margin: 20px 0 16px;
        }
        .step {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            background: #eef3f1;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #5f8b7c;
        }
        .step.active {
            background: #2c7a6e;
            color: white;
            box-shadow: 0 2px 8px rgba(44,122,110,0.3);
        }

        /* 按钮 */
        .btn {
            background: #2c7a6e;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .btn-secondary {
            background: #e67e22;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2c7a6e;
            color: #2c7a6e;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .btn-group .btn {
            flex: 1;
        }

        /* 进度模拟区 */
        .progress-panel {
            background: #eef3f1;
            border-radius: 28px;
            padding: 16px;
            margin-top: 16px;
        }
        .progress-text {
            font-weight: 600;
            color: #1f6e5c;
            margin-bottom: 8px;
        }
        .progress-sub {
            font-size: 0.7rem;
            color: #6b8f82;
        }

        /* 地图容器 */
        .map-container {
            width: 100%;
            height: 340px;
            border-radius: 32px;
            overflow: hidden;
            margin: 16px 0;
            border: 2px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        /* 信息卡片 */
        .info-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 12px 16px;
            margin: 12px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 6px;
        }

        /* 日志区域 */
        .log-area {
            background: #1e2a2e;
            border-radius: 24px;
            padding: 12px;
            height: 120px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.7rem;
            color: #b3ffe6;
            margin-top: 16px;
        }
        .log-line {
            border-bottom: 1px solid #2e4a4a;
            padding: 4px 0;
        }

        .hidden {
            display: none;
        }

        /* 低功耗提示弹窗 */
        .modal-mask {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .modal-card {
            background: white;
            border-radius: 48px;
            padding: 24px;
            width: 280px;
            text-align: center;
        }
        .modal-card p {
            margin: 16px 0;
        }
        .modal-btn {
            background: #2c7a6e;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="phone-app" id="app">
    <h1>🐾 宠物定位追踪器</h1>
    <div class="sub">NB-IoT 智能项圈 · 实时守护</div>

    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="device-status" id="deviceStatus">⚪ 未连接</div>
        <div class="battery" id="batteryInfo">🔋 --%</div>
        <div class="signal" id="signalInfo">📶 --dBm</div>
    </div>

    <!-- 连接步骤模拟 -->
    <div class="step-indicator" id="stepIndicator">
        <div class="step active" id="stepScan">1️⃣ 扫描终端</div>
        <div class="step" id="stepConnect">2️⃣ 建立链路</div>
        <div class="step" id="stepProgress">3️⃣ 激活数据</div>
    </div>

    <!-- 主控制按钮 -->
    <button id="connectActionBtn" class="btn">🔍 连接 NB-IoT 终端</button>
    <div id="progressPanel" class="progress-panel hidden">
        <div class="progress-text" id="progressText">正在注册网络...</div>
        <div class="progress-sub" id="progressSub">中国移动 NB-IoT</div>
    </div>

    <!-- 远程报警按钮 -->
    <div class="btn-group">
        <button id="alarmBtn" class="btn btn-secondary">🚨 远程报警 (B)</button>
    </div>

    <!-- 高德地图 -->
    <div id="mapContainer" class="map-container"></div>

    <!-- 实时信息 -->
    <div class="info-card">
        <div class="info-row"><span>📡 最新坐标</span><span id="lastCoord">等待定位...</span></div>
        <div class="info-row"><span>🐕 定位源</span><span id="dataSource">终端直连</span></div>
        <div class="info-row"><span>⏱️ 低功耗计时</span><span id="idleTimerDisplay">--</span></div>
    </div>

    <!-- 系统日志 -->
    <div class="log-area" id="logPanel">
        <div class="log-line">⚙️ 系统就绪，等待连接终端...</div>
    </div>
</div>

<script>
    // ==================== NB-IoT 终端配置 (底层蓝牙实现，UI完全隐藏) ====================
    const TARGET_DEVICE_NAME = "BT_ECB1A5B055A4";
    // 使用与原有代码一致的 UUID (兼容 Nordic UART)
    const SERVICE_UUID = "0000fff0-0000-1000-8000-00805f9b34fb";
    const NOTIFY_UUID = "0000fff2-0000-1000-8000-00805f9b34fb";
    const WRITE_UUID = "0000fff1-0000-1000-8000-00805f9b34fb";

    // DOM 元素
    const connectBtn = document.getElementById('connectActionBtn');
    const alarmBtn = document.getElementById('alarmBtn');
    const deviceStatusDiv = document.getElementById('deviceStatus');
    const batteryInfo = document.getElementById('batteryInfo');
    const signalInfo = document.getElementById('signalInfo');
    const stepScan = document.getElementById('stepScan');
    const stepConnect = document.getElementById('stepConnect');
    const stepProgress = document.getElementById('stepProgress');
    const progressPanel = document.getElementById('progressPanel');
    const progressText = document.getElementById('progressText');
    const progressSub = document.getElementById('progressSub');
    const lastCoordSpan = document.getElementById('lastCoord');
    const dataSourceSpan = document.getElementById('dataSource');
    const idleTimerSpan = document.getElementById('idleTimerDisplay');
    const logPanel = document.getElementById('logPanel');

    // 内部变量
    let internalDevice = null;          // BluetoothDevice 对象
    let notifyChar = null;
    let writeChar = null;
    let isConnected = false;
    let idleTimer = null;
    let lastUserActivity = Date.now();
    let lowPowerWarningShown = false;    // 防止重复弹窗
    let batteryInterval = null;
    let signalInterval = null;

    // 高德地图相关
    let map = null;
    let marker = null;
    // 自定义宠物图标 (爪子图标)
    const petIcon = "https://webapi.amap.com/theme/v1.3/markers/n/mark_bs.png"; // 可替换为自定义图片，为了可爱用猫爪风格
    // 实际可以换成更好的图标，这里使用高德默认标记的变体，但为了宠物感，可用 emoji 覆盖？直接用带标记点
    // 为了宠物效果，使用一个自定义的蓝色小狗图标 (网络图片)
    const CUSTOM_ICON = "https://cdn-icons-png.flaticon.com/512/1998/1998627.png"; // 小狗爪子图标，稳定外链

    // 添加日志
    function addLog(msg) {
        const line = document.createElement('div');
        line.className = 'log-line';
        line.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logPanel.appendChild(line);
        logPanel.scrollTop = logPanel.scrollHeight;
        if (logPanel.children.length > 30) logPanel.removeChild(logPanel.children[0]);
        console.log(msg);
    }

    // 更新UI状态
    function updateUIStatus(connected) {
        if (connected) {
            deviceStatusDiv.className = 'device-status online';
            deviceStatusDiv.textContent = '● 在线';
            stepScan.classList.remove('active');
            stepConnect.classList.remove('active');
            stepProgress.classList.remove('active');
            stepProgress.classList.add('active');
        } else {
            deviceStatusDiv.className = 'device-status';
            deviceStatusDiv.textContent = '⚪ 未连接';
            stepScan.classList.add('active');
            stepConnect.classList.remove('active');
            stepProgress.classList.remove('active');
            progressPanel.classList.add('hidden');
        }
    }

    // 模拟信号强度 & 电量 (随机变化，增加真实感)
    function startMetricsSimulation() {
        if (batteryInterval) clearInterval(batteryInterval);
        if (signalInterval) clearInterval(signalInterval);
        batteryInterval = setInterval(() => {
            if (isConnected) {
                const bat = Math.floor(70 + Math.random() * 25);
                batteryInfo.innerHTML = `🔋 ${bat}%`;
            } else {
                batteryInfo.innerHTML = `🔋 --%`;
            }
        }, 15000);
        signalInterval = setInterval(() => {
            if (isConnected) {
                const rssi = Math.floor(-85 + Math.random() * 20);
                signalInfo.innerHTML = `📶 ${rssi}dBm`;
            } else {
                signalInfo.innerHTML = `📶 --dBm`;
            }
        }, 10000);
    }

    // 重置低功耗计时器
    function resetIdleTimer() {
        lastUserActivity = Date.now();
        idleTimerSpan.innerText = "30秒无操作进入低功耗";
        if (lowPowerWarningShown) lowPowerWarningShown = false;
        if (idleTimer) clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            const now = Date.now();
            if (now - lastUserActivity >= 30000 && isConnected && !lowPowerWarningShown) {
                lowPowerWarningShown = true;
                // 显示弹窗提示
                showLowPowerModal();
                // 通过蓝牙下发指令 A
                if (writeChar) {
                    const encoder = new TextEncoder();
                    writeChar.writeValue(encoder.encode("A"));
                    addLog("📴 进入低功耗模式，下发指令 A");
                } else {
                    addLog("⚠️ 无法下发低功耗指令 (写入通道未就绪)", true);
                }
            }
        }, 30000);
    }

    // 低功耗提示弹窗
    function showLowPowerModal() {
        const modal = document.createElement('div');
        modal.className = 'modal-mask';
        modal.innerHTML = `
            <div class="modal-card">
                <div style="font-size: 2rem;">🔋</div>
                <p>终端进入低功耗模式<br>已发送省电指令</p>
                <button class="modal-btn" id="closeModalBtn">知道了</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeModalBtn').onclick = () => modal.remove();
        addLog("⏺ 由于无操作，终端已进入低功耗模式");
    }

    // 监听用户交互 (重置计时器)
    function bindUserActivityTracking() {
        const events = ['click', 'touchstart', 'touchend'];
        events.forEach(ev => {
            window.addEventListener(ev, () => {
                if (isConnected) resetIdleTimer();
            });
        });
        // 也监听地图容器触摸
        const mapDiv = document.getElementById('mapContainer');
        if (mapDiv) mapDiv.addEventListener('touchstart', () => { if(isConnected) resetIdleTimer(); });
    }

    // ==================== 高德地图初始化 ====================
    function initMap() {
        return new Promise((resolve) => {
            if (window.AMap) {
                map = new AMap.Map('mapContainer', {
                    zoom: 15,
                    center: [116.397428, 39.90923],
                    viewMode: '2D',
                    resizeEnable: true
                });
                // 自定义宠物图标
                const icon = new AMap.Icon({
                    size: new AMap.Size(40, 40),
                    image: CUSTOM_ICON,
                    imageSize: new AMap.Size(40, 40)
                });
                marker = new AMap.Marker({
                    position: [116.397428, 39.90923],
                    map: map,
                    icon: icon,
                    title: "宠物位置"
                });
                resolve();
            } else {
                setTimeout(() => initMap().then(resolve), 200);
            }
        });
    }

    function updateMapPosition(lng, lat) {
        if (!map || !marker) return;
        const position = [lng, lat];
        marker.setPosition(position);
        map.setCenter(position);
        lastCoordSpan.innerText = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
    }

    // ==================== 数据解析 (接收经纬度) ====================
    function parseLocationFromData(rawMsg) {
        let trimmed = rawMsg.trim();
        if (!trimmed.startsWith("#")) trimmed = "#" + trimmed;
        if (!trimmed.endsWith("#")) trimmed = trimmed + "#";
        const parts = trimmed.split("#").filter(p => p !== "");
        if (parts.length < 2) return null;
        // 注意上传格式: #经度#纬度#
        const lng = parseFloat(parts[0]);
        const lat = parseFloat(parts[1]);
        if (isNaN(lng) || isNaN(lat)) return null;
        return { lng, lat };
    }

    function onDataReceived(event) {
        const value = event.target.value;
        const decoder = new TextDecoder('utf-8');
        const raw = decoder.decode(value);
        addLog(`📥 终端数据: ${raw}`);
        const location = parseLocationFromData(raw);
        if (location) {
            const { lng, lat } = location;
            updateMapPosition(lng, lat);
            dataSourceSpan.innerText = "实时直连";
            addLog(`📍 更新宠物位置: 经度 ${lng}, 纬度 ${lat}`);
            // 每次收到数据重置低功耗计时器
            resetIdleTimer();
        } else {
            addLog(`⚠️ 无法解析坐标: ${raw}`);
        }
    }

    // ==================== 连接核心 (模拟NB-IoT网络附着) ====================
    async function establishDataChannel(server) {
        try {
            const service = await server.getPrimaryService(SERVICE_UUID);
            notifyChar = await service.getCharacteristic(NOTIFY_UUID);
            await notifyChar.startNotifications();
            notifyChar.addEventListener('characteristicvaluechanged', onDataReceived);
            try {
                writeChar = await service.getCharacteristic(WRITE_UUID);
            } catch(e) { addLog("写入通道未找到，部分功能不可用"); }
            isConnected = true;
            updateUIStatus(true);
            // 模拟 NB-IoT 激活过程
            progressPanel.classList.remove('hidden');
            stepConnect.classList.remove('active');
            stepProgress.classList.add('active');
            progressText.textContent = "注册网络...";
            progressSub.textContent = "中国移动 NB-IoT";
            setTimeout(() => {
                progressText.textContent = "附着网络...";
                progressSub.textContent = "获取 IP 10.42.1.89";
            }, 800);
            setTimeout(() => {
                progressText.textContent = "✅ 数据通道已建立";
                progressSub.textContent = "实时接收定位数据";
                addLog("✅ NB-IoT 数据通道激活成功");
                // 启动低功耗计时
                resetIdleTimer();
            }, 1600);
            // 启动信号电量模拟
            startMetricsSimulation();
            return true;
        } catch(err) {
            addLog(`数据通道建立失败: ${err.message}`);
            throw err;
        }
    }

    // 自动连接已授权的终端
    async function tryAutoConnect() {
        if (!navigator.bluetooth || !navigator.bluetooth.getDevices) return false;
        try {
            const devices = await navigator.bluetooth.getDevices();
            const target = devices.find(d => d.name === TARGET_DEVICE_NAME);
            if (target) {
                addLog("🔍 发现已授权终端，自动建立链路...");
                internalDevice = target;
                const server = await target.gatt.connect();
                await establishDataChannel(server);
                internalDevice.addEventListener('gattserverdisconnected', onDeviceDisconnect);
                return true;
            }
        } catch(e) {
            addLog(`自动连接尝试失败: ${e.message}`);
        }
        return false;
    }

    async function scanAndConnect() {
        // 先尝试自动连接
        const autoConnected = await tryAutoConnect();
        if (autoConnected) return;

        // 手动扫描
        try {
            const device = await navigator.bluetooth.requestDevice({
                filters: [{ name: TARGET_DEVICE_NAME }],
                optionalServices: [SERVICE_UUID]
            });
            internalDevice = device;
            addLog(`📱 已识别终端: ${device.name}`);
            // 更新步骤UI
            stepScan.classList.remove('active');
            stepConnect.classList.add('active');
            progressPanel.classList.remove('hidden');
            progressText.textContent = "正在建立连接...";
            progressSub.textContent = "终端鉴权中";
            const server = await device.gatt.connect();
            await establishDataChannel(server);
            device.addEventListener('gattserverdisconnected', onDeviceDisconnect);
        } catch (error) {
            if (!error.message.includes('cancelled')) {
                addLog(`连接失败: ${error.message}`);
                progressPanel.classList.add('hidden');
                stepScan.classList.add('active');
                stepConnect.classList.remove('active');
            }
        }
    }

    function onDeviceDisconnect() {
        isConnected = false;
        updateUIStatus(false);
        addLog("⚠️ 终端已断开，请重新连接");
        if (idleTimer) clearTimeout(idleTimer);
        idleTimerSpan.innerText = "--";
        internalDevice = null;
        notifyChar = null;
        writeChar = null;
        progressPanel.classList.add('hidden');
    }

    // 下发报警指令 B
    async function sendAlarmCommand() {
        if (!isConnected || !writeChar) {
            addLog("❌ 终端未连接，无法发送报警指令");
            return;
        }
        try {
            const encoder = new TextEncoder();
            await writeChar.writeValue(encoder.encode("B"));
            addLog("🚨 已下发远程报警指令 B");
        } catch(e) {
            addLog(`指令发送失败: ${e.message}`);
        }
    }

    // ==================== 页面初始化 ====================
    async function init() {
        await initMap();
        bindUserActivityTracking();
        connectBtn.addEventListener('click', () => {
            if (!isConnected) {
                scanAndConnect();
            } else {
                addLog("终端已在线，无需重复连接");
            }
        });
        alarmBtn.addEventListener('click', sendAlarmCommand);
        // 预置模拟信号电量显示（未连接时灰色）
        startMetricsSimulation();
        addLog("🐕 宠物定位系统已启动，请连接 NB-IoT 终端");
    }

    init();
</script>
</body>
</html>
